<h2>CPPA 合約主檔</h2>

<div class="card">
  <div class="card-title">功能說明</div>
  <p>
  管理 CPPA（Corporate Power Purchase Agreement）合約資料。此模組記錄發電案場與用電客戶之間的綠電採購關係，
  包含合約期間、契約容量、電價制度與供電來源。該資料將作為綠電匹配、轉供策略與結算模組的基礎資料。
  </p>
</div>

        <th>合約期間</th>

        <th>操作</th>
