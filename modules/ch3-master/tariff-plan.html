<h2>電價制度主檔</h2>

<div class="card">
  <div class="card-title">功能說明</div>
  <p>
  定義 CPPA 合約所採用的電價制度。電價制度用於描述不同時間區段（例如尖峰、半尖峰、離峰）
  的電價計算方式，並作為後續電價版本與電價時段設定的基礎。
  </p>
</div>

<div class="card">

  <div class="card-title">電價制度列表</div>

  <button class="button button-primary">新增電價制度</button>

  <table class="table" style="margin-top:12px;">

    <thead>
      <tr>
        <th>制度代碼</th>
        <th>制度名稱</th>
        <th>說明</th>
        <th>狀態</th>
        <th>操作</th>
      </tr>
    </thead>

    <tbody>

      <tr>
        <td>TARIFF001</td>
        <td>標準 TOU 電價</td>
        <td>尖峰 / 半尖峰 / 離峰</td>
        <td><span class="badge">Active</span></td>
        <td class="table-actions">
          <button class="button button-secondary">查看</button>
          <button class="button button-secondary">編輯</button>
        </td>
      </tr>

      <tr>
        <td>TARIFF002</td>
        <td>固定電價</td>
        <td>全年單一電價</td>
        <td><span class="badge">Active</span></td>
        <td class="table-actions">
          <button class="button button-secondary">查看</button>
          <button class="button button-secondary">編輯</button>
        </td>
      </tr>

    </tbody>

  </table>

</div>
