<h2>電價制度版本</h2>

<div class="card">
  <div class="card-title">功能說明</div>
  <p>
  電價制度版本用於管理同一電價制度在不同年度或期間的電價設定。
  例如每年可能會有不同的尖峰、半尖峰與離峰電價，因此透過版本管理
  可以保留歷史資料並支援結算與分析。
  </p>
</div>
