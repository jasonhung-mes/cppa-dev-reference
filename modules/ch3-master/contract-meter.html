<h2>合約電號關聯</h2>

<div class="card">
  <div class="card-title">功能說明</div>
  <p>
  合約電號關聯用於定義 CPPA 合約所涵蓋的用電電號範圍。
  由於一份合約可能對應多個電號，而一個電號也可能在不同期間對應不同合約，
  因此本模組負責管理合約與電號之多對多關聯關係。
  此資料將作為綠電匹配、轉供策略與履約分析的重要依據。
  </p>
</div>
