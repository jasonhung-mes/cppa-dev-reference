
<h2>電號主檔</h2>

<div class="card">
  <div class="card-title">功能說明</div>
  <p>
  電號主檔用於管理實際用電據點（Physical Meter）。
  每個電號代表一個實體用電位置，例如工廠或園區據點，
  並對應台電電號與供電電壓等資訊。
  在 CPPA 架構中，電號是「客戶」與「合約供電」之間的重要橋樑。
  </p>
</div>
